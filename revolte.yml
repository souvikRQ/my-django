revolte:
  version: '1.0'
  project: Revolte Beta Test
  appName: Python Django
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    testSuite:
      command: python3 manage.py test
    automationTestSuite:
      command: python3 manage.py test:automation
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: main
      codeReview: true
      testSuite: true
      automationTestSuite: true
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: python3 manage.py runserver 0.0.0.0:8080
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              BASE_URL: /
              DATABASE_HOST: ep-morning-night-aqfia1du.c-8.us-east-1.aws.neon.tech
              DATABASE_PORT: 5432
              DATABASE_USER: neondb_owner
              DATABASE_PASSWORD: npg_f9oFWg0tTRym
              DATABASE_NAME: neondb
          specifications:
            cpu: 2
            memory: 1
            storage: 30
